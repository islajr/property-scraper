name: Property Scraper CI

# Trigger the workflow on push or pull requests to 'master'
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{secrets.DATABASE_URL}}
      TELEGRAM_BOT_TOKEN: ${{secrets.TELEGRAM_BOT_TOKEN}}
      TELEGRAM_CHAT_ID:   ${{secrets.TELEGRAM_CHAT_ID}}
      NOMINATIM_CONTACT_EMAIL:  ${{secrets.NOMINATIM_CONTACT_EMAIL}}
      DEBUG: "False"
      API_ENV: "testing"

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: set up python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: install dependencies
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: run tests
      run:  |
        pytest tests -v