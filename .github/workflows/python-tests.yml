name: Property Scraper CI

# Trigger the workflow on push or pull requests to 'master'
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: install dependencies
      run:  |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: run tests
      run:  |
        pytest tests -v