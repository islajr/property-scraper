name: Property Scraper — Weekly Run

on:
  schedule:
    - cron: '0 20 * * 0'    # Sundays at 20:00 UTC (9:00 PM Lagos WAT)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      NOMINATIM_CONTACT_EMAIL: ${{secrets.NOMINATIM_CONTACT_EMAIL}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # - name: Install Playwright browsers (Chromium only)
      #   run: |
      #     sudo apt-get install -y --no-install-recommends \
      #       libnss3 libnspr4 libdbus-1-3 \
      #       libatk1.0-0t64 libatk-bridge2.0-0t64 \
      #       libcups2t64 libxkbcommon0 libatspi2.0-0t64 \
      #       libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
      #       libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      #     playwright install chromium

      - name: Apply DB schema
        run: |
          python - <<'EOF'
          import psycopg2, os
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          with conn.cursor() as cur, open("schema/001_raw_data_schema.sql") as f:
              cur.execute(f.read())
          conn.close()
          print("Schema applied.")
          EOF

      - name: Run scraper
        env:
          HTTP_PROXY: ${{ secrets.PROXY_URL }}
          HTTPS_PROXY: ${{ secrets.PROXY_URL }}
        run: python -m scraper.orchestrator

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 14