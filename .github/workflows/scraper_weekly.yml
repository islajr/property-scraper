name: Property Scraper — Weekly Run

on:
  schedule:
    - cron: '0 1 * * 0'    # Sunday 01:00 UTC = 02:00 Lagos WAT
  workflow_dispatch:          # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      NOMINATIM_CONTACT_EMAIL: ${{secrets.NOMINATIM_CONTACT_EMAIL}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # - name: Install Playwright browsers (Chromium only)
      #   run: |
      #     # Install Chromium system deps manually for Ubuntu 24.04 (Noble).
      #     # We do NOT use --with-deps because playwright's internal apt script
      #     # still hardcodes 'libasound2' (renamed to libasound2t64 in Noble)
      #     # and will fail regardless of any pre-install workaround.
      #     sudo apt-get install -y --no-install-recommends \
      #       libnss3 libnspr4 libdbus-1-3 \
      #       libatk1.0-0t64 libatk-bridge2.0-0t64 \
      #       libcups2t64 libxkbcommon0 libatspi2.0-0t64 \
      #       libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
      #       libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      #     playwright install chromium

      - name: Install and start Tor & Privoxy
        run: |
          sudo apt-get update
          sudo apt-get install -y tor privoxy
          
          # Configure privoxy to route HTTP requests through Tor's local SOCKS5 proxy (port 9050)
          echo "forward-socks5t / 127.0.0.1:9050 ." | sudo tee -a /etc/privoxy/config
          
          # Start Tor and restart Privoxy
          sudo service tor start
          sudo service privoxy restart
          
          # Give Tor 5 seconds to bootstrap a connection
          sleep 5

      - name: Apply DB schema (idempotent — IF NOT EXISTS guards)
        run: |
          python - <<'EOF'
          import psycopg2, os
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          with conn.cursor() as cur, open("schema/001_raw_data_schema.sql") as f:
              cur.execute(f.read())
          conn.close()
          print("Schema applied.")
          EOF

      - name: Run scraper
        env:
          HTTP_PROXY: http://127.0.0.1:8118
          HTTPS_PROXY: http://127.0.0.1:8118
        run: python -m scraper.orchestrator

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 14