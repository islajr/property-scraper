name: Property Scraper — Daily Health Check

on:
  schedule:
    - cron: '0 20 * * *'    # Daily at 20:00 UTC (9:00 PM Lagos WAT)
  workflow_dispatch:      # Enable manual trigger from GitHub UI
    inputs:
      force_all:
        description: 'Force check all active listings (bypass cooldown and limits)'
        type: boolean
        required: false
        default: false

jobs:
  health-check:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      NOMINATIM_CONTACT_EMAIL: ${{ secrets.NOMINATIM_CONTACT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run health check
        env:
          HTTP_PROXY: ${{ secrets.PROXY_URL }}
          HTTPS_PROXY: ${{ secrets.PROXY_URL }}
        run: python -m scraper.orchestrator --health-check

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-error-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 14
